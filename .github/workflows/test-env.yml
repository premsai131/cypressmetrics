name: Run Karate Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '35 11 * * *' # blitzv2 -> 5:05 PM IST
    - cron: '40 11 * * *' # stagev2 -> 5:10 PM IST

jobs:
  determine-environment:
    runs-on: ubuntu-latest

    outputs:
      env_name: ${{ steps.set-default.outputs.env_name }}

    steps:
      - name: Set environment name
        id: set-default
        run: |
          echo "Event Name: ${{ github.event_name }}"
          echo "Triggered Schedule: [${{ github.event.schedule }}]"

          if [[ "${{ github.event_name }}" == "schedule" ]]; then

            if [[ "${{ github.event.schedule }}" == "35 11 * * *" ]]; then
              echo "Detected blitzv2 scheduled run"
              echo "env_name=blitzv2" >> $GITHUB_OUTPUT

            elif [[ "${{ github.event.schedule }}" == "40 11 * * *" ]]; then
              echo "Detected stagev2 scheduled run"
              echo "env_name=stagev2" >> $GITHUB_OUTPUT

            else
              echo "Unknown schedule detected"
              exit 1
            fi

          fi

          echo "Final environment:"
          cat $GITHUB_OUTPUT

      - name: Print selected environment
        run: |
          echo "Selected env: ${{ steps.set-default.outputs.env_name }}"
